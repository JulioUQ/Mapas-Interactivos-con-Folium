<div style="position: fixed; top: 10px; left: 50px; z-index: 9999; background: white; padding: 8px; border-radius: 5px;">
  <label for="mareaSelect"><b>Marea:</b></label>
  <select id="mareaSelect"><option value="M1">M1</option><option value="M2">M2</option><option value="M3">M3</option></select>
</div>
<script>
  var layersByMarea = {'M1': 'marea_M1', 'M2': 'marea_M2', 'M3': 'marea_M3'};

  function showMarea(marea) {
    // Quitar todas las capas de mareas
    map.eachLayer(function(layer) {
      if (layer.options && layer.options.name && layer.options.name.startsWith("marea_")) {
        map.removeLayer(layer);
      }
    });
    // Añadir solo la seleccionada
    map.eachLayer(function(layer) {
      if (layer.options && layer.options.name === layersByMarea[marea]) {
        map.addLayer(layer);
        if (layer.getBounds) {
          map.fitBounds(layer.getBounds());
        }
      }
    });
  }

  // Al cambiar el select
  document.getElementById("mareaSelect").addEventListener("change", function(e) {
    showMarea(e.target.value);
  });

  // Mostrar la primera marea por defecto
  var first = Object.keys(layersByMarea)[0];
  document.getElementById("mareaSelect").value = first;
  showMarea(first);
</script>
